spring:
  application:
    name: vaultstream

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vaultstream}
    username: ${DB_USER:sara_admin}
    password: ${DB_PASSWORD:qwerty}

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

# JWT secret — always override via environment variable in production
api:
  security:
    token:
      secret: ${JWT_SECRET:my-secret-key}

# Service identity used in every log line and Logstash custom field
app:
  service-name: vaultstream
  logstash:
    host: ${LOGSTASH_HOST:localhost}
    port: ${LOGSTASH_PORT:5000}

# Actuator — expose health, metrics, and the Prometheus scrape endpoint
management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus, info
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# Logging levels (override per profile or env var)
logging:
  level:
    root: INFO
    com.letroca: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
  file:
    path: logs

---
# Development profile — verbose app logs, human-readable console
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.letroca: DEBUG

---
# Production profile — JSON console output (handled by logback-spring.xml prod profile)
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.letroca: INFO
