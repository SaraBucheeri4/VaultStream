input {
  # Receives JSON logs from Spring Boot via LogstashTcpSocketAppender
  tcp {
    port  => 5000
    codec => json_lines
  }
}

filter {
  # Normalise the timestamp sent by Logstash encoder
  if [timestamp] {
    date {
      match   => ["timestamp", "ISO8601"]
      target  => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Tag error/warn events for easy Kibana filtering
  if [level] == "ERROR" {
    mutate { add_tag => ["error"] }
  } else if [level] == "WARN" {
    mutate { add_tag => ["warning"] }
  }

  # Drop the Logstash internal pipeline heartbeat events
  if [type] == "heartbeat" {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # One index per day, e.g. vaultstream-logs-2024.05.19
    index => "vaultstream-logs-%{+YYYY.MM.dd}"
  }

  # Mirror to stdout in the Logstash container — useful for debugging
  stdout {
    codec => rubydebug { metadata => false }
  }
}
