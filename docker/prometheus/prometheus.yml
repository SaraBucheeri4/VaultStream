global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: vaultstream

scrape_configs:
  - job_name: vaultstream
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8081"]
        labels:
          service: vaultstream

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
