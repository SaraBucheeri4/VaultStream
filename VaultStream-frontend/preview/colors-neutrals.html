<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:220px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="eyebrow" style="margin-bottom:14px">NEUTRALS · CANVAS &amp; TEXT</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
  
    <div style="border-radius:12px;overflow:hidden;border:1px solid var(--line-2)">
      <div style="height:60px;background:#08090F"></div>
      <div style="padding:8px 10px;background:var(--bg-2)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">bg-0</div>
        <div style="font:var(--t-mono);font-size:10.5px;color:var(--fg-3)">#08090F</div>
        <div style="font:var(--t-micro);color:var(--fg-4);margin-top:2px;letter-spacing:.1em">PAGE</div>
      </div>
    </div>
    <div style="border-radius:12px;overflow:hidden;border:1px solid var(--line-2)">
      <div style="height:60px;background:#0F172A"></div>
      <div style="padding:8px 10px;background:var(--bg-2)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">bg-1</div>
        <div style="font:var(--t-mono);font-size:10.5px;color:var(--fg-3)">#0F172A</div>
        <div style="font:var(--t-micro);color:var(--fg-4);margin-top:2px;letter-spacing:.1em">CANVAS</div>
      </div>
    </div>
    <div style="border-radius:12px;overflow:hidden;border:1px solid var(--line-2)">
      <div style="height:60px;background:#131C32"></div>
      <div style="padding:8px 10px;background:var(--bg-2)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">bg-2</div>
        <div style="font:var(--t-mono);font-size:10.5px;color:var(--fg-3)">#131C32</div>
        <div style="font:var(--t-micro);color:var(--fg-4);margin-top:2px;letter-spacing:.1em">SURFACE</div>
      </div>
    </div>
    <div style="border-radius:12px;overflow:hidden;border:1px solid var(--line-2)">
      <div style="height:60px;background:#1B2440"></div>
      <div style="padding:8px 10px;background:var(--bg-2)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">bg-3</div>
        <div style="font:var(--t-mono);font-size:10.5px;color:var(--fg-3)">#1B2440</div>
        <div style="font:var(--t-micro);color:var(--fg-4);margin-top:2px;letter-spacing:.1em">ELEVATED</div>
      </div>
    </div>
</div>
<div style="margin-top:14px;display:flex;gap:18px;align-items:center;padding:12px 14px;background:rgba(255,255,255,.02);border-radius:12px">
  <div><div style="font:600 22px var(--font-sans);color:#F8FAFC">Aa</div><div style="font:var(--t-mono);font-size:10.5px;color:var(--fg-3)">fg-1 · #F8FAFC</div></div>
  <div><div style="font:600 22px var(--font-sans);color:#CBD5E1">Aa</div><div style="font:var(--t-mono);font-size:10.5px;color:var(--fg-3)">fg-2 · #CBD5E1</div></div>
  <div><div style="font:600 22px var(--font-sans);color:#94A3B8">Aa</div><div style="font:var(--t-mono);font-size:10.5px;color:var(--fg-3)">fg-3 · #94A3B8</div></div>
  <div><div style="font:600 22px var(--font-sans);color:#64748B">Aa</div><div style="font:var(--t-mono);font-size:10.5px;color:var(--fg-3)">fg-4 · #64748B</div></div>
</div></body></html>
