<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:280px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div style="display:grid;grid-template-columns:1.2fr 1fr;gap:24px;align-items:center;height:100%">
  <div style="display:flex;flex-direction:column;justify-content:center;gap:18px">
    <div style="display:flex;align-items:center;gap:14px">
      <img src="../assets/logomark.svg" width="56" height="56" alt="">
      <div>
        <div style="font:700 28px var(--font-brand);letter-spacing:2px;color:var(--primary-400)">FINTECH_OS</div>
        <div style="font:700 10.5px var(--font-brand);letter-spacing:.22em;color:var(--fg-3);margin-top:6px">CORE ENGINE · OBSERVABILITY</div>
      </div>
    </div>
    <div style="padding:14px 18px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid var(--line-2);display:flex;align-items:center;gap:14px">
      <span style="font:700 17px var(--font-brand);letter-spacing:1.5px;color:var(--primary-400)">FINTECH_OS</span>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div class="label">USAGE</div>
    <div style="font:var(--t-body);color:var(--fg-2)">Orbitron wordmark in solid violet on dark surfaces. The Core Engine product label sits beneath it in the same face.</div>
  </div>
</div></body></html>
