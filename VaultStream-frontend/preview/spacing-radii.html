<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:190px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="label" style="margin-bottom:14px">CORNER RADII</div>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:78px;height:78px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:6px"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">xs · 6</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">inputs</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:78px;height:78px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:8px"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">sm · 8</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">pills</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:78px;height:78px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:12px"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">md · 12</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">buttons</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:78px;height:78px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:16px"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">lg · 16</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">cards</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:78px;height:78px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:22px"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">xl · 22</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">hero</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:78px;height:78px;background:var(--bg-3);border:1px solid var(--line-2);border-radius:999px"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">pill · 999</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">badges</div>
    </div>
</div></body></html>
