<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:280px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="label" style="margin-bottom:14px">CHART CARD · SOLID STROKE</div>
<div style="background:var(--card-bg);border:1px solid var(--line-1);border-radius:14px;padding:20px 22px">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
    <div>
      <div style="font:700 16px var(--font-display)">Infrastructure Load</div>
      <div style="font:400 12.5px var(--font-body);color:var(--fg-3);margin-top:3px">Compute vs Memory distribution across nodes.</div>
    </div>
    <div style="display:inline-flex;background:rgba(255,255,255,.04);border:1px solid var(--line-2);border-radius:9px;padding:2px">
      <span style="padding:5px 12px;border-radius:7px;font:600 11.5px var(--font-body);background:var(--primary-400);color:#1B1238">Live</span>
      <span style="padding:5px 12px;border-radius:7px;font:600 11.5px var(--font-body);color:var(--fg-3)">1H</span>
      <span style="padding:5px 12px;border-radius:7px;font:600 11.5px var(--font-body);color:var(--fg-3)">24H</span>
    </div>
  </div>
  <svg viewBox="0 0 620 130" width="100%" height="130" preserveAspectRatio="none">
    <defs>
      <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="M0,100 C40,80 60,40 100,60 S180,110 220,80 S320,20 360,50 S460,100 500,60 S580,30 620,80 L620,130 L0,130 Z" fill="url(#fill)"/>
    <path d="M0,100 C40,80 60,40 100,60 S180,110 220,80 S320,20 360,50 S460,100 500,60 S580,30 620,80" fill="none" stroke="#A78BFA" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
</div></body></html>
