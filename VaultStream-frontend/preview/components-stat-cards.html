<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:240px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="label" style="margin-bottom:14px">STAT CARDS · ACCENT COLOR PER METRIC</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
  
    <div style="background:var(--card-bg);border:1px solid var(--line-1);border-radius:14px;padding:18px 20px">
      <div style="font:500 12px var(--font-body);color:var(--fg-3)">Total Logs Today</div>
      <div style="font:800 36px var(--font-display);letter-spacing:-1.2px;color:var(--primary-400);margin:10px 0 12px">1,284,502</div>
      <div style="display:flex;align-items:center;gap:6px;font:500 12px var(--font-body);color:var(--tertiary-400)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M7 7h10v10"/></svg>+12.5% from yesterday</div>
    </div>
    <div style="background:var(--card-bg);border:1px solid var(--line-1);border-radius:14px;padding:18px 20px">
      <div style="font:500 12px var(--font-body);color:var(--fg-3)">System Error Rate</div>
      <div style="font:800 36px var(--font-display);letter-spacing:-1.2px;color:var(--secondary-400);margin:10px 0 12px">0.042%</div>
      <div style="display:flex;align-items:center;gap:6px;font:500 12px var(--font-body);color:var(--secondary-400)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>Within safety threshold</div>
    </div>
    <div style="background:var(--card-bg);border:1px solid var(--line-1);border-radius:14px;padding:18px 20px">
      <div style="font:500 12px var(--font-body);color:var(--fg-3)">Active Microservices</div>
      <div style="font:800 36px var(--font-display);letter-spacing:-1.2px;color:var(--tertiary-400);margin:10px 0 12px">12 / 12</div>
      <div style="display:flex;gap:6px"><i style="width:8px;height:8px;border-radius:99px;background:var(--tertiary-400);box-shadow:0 0 6px var(--tertiary-400);display:block"></i><i style="width:8px;height:8px;border-radius:99px;background:var(--tertiary-400);box-shadow:0 0 6px var(--tertiary-400);display:block"></i><i style="width:8px;height:8px;border-radius:99px;background:var(--tertiary-400);box-shadow:0 0 6px var(--tertiary-400);display:block"></i><i style="width:8px;height:8px;border-radius:99px;background:var(--tertiary-400);box-shadow:0 0 6px var(--tertiary-400);display:block"></i></div>
    </div>
</div></body></html>
