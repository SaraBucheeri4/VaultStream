<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:200px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="label" style="margin-bottom:14px">LOG LEVEL · SEMANTIC COLOR</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
  
    <div style="border-radius:12px;padding:14px;background:var(--card-bg);border:1px solid var(--line-1)">
      <span style="display:inline-block;padding:3px 10px;border-radius:6px;background:#4A0F1E;color:#FB7185;font:700 10.5px var(--font-mono);letter-spacing:.08em">ERROR</span>
      <div style="margin-top:10px;font:var(--t-mono);font-size:11.5px;color:var(--fg-3)">#FB7185</div>
      <div style="margin-top:6px;font:var(--t-small);color:var(--fg-2)">Critical failures · auth · db</div>
    </div>
    <div style="border-radius:12px;padding:14px;background:var(--card-bg);border:1px solid var(--line-1)">
      <span style="display:inline-block;padding:3px 10px;border-radius:6px;background:#2C1F4A;color:#C084FC;font:700 10.5px var(--font-mono);letter-spacing:.08em">WARN</span>
      <div style="margin-top:10px;font:var(--t-mono);font-size:11.5px;color:var(--fg-3)">#C084FC</div>
      <div style="margin-top:6px;font:var(--t-small);color:var(--fg-2)">Threshold crossings · latency</div>
    </div>
    <div style="border-radius:12px;padding:14px;background:var(--card-bg);border:1px solid var(--line-1)">
      <span style="display:inline-block;padding:3px 10px;border-radius:6px;background:#103847;color:#22D3EE;font:700 10.5px var(--font-mono);letter-spacing:.08em">INFO</span>
      <div style="margin-top:10px;font:var(--t-mono);font-size:11.5px;color:var(--fg-3)">#22D3EE</div>
      <div style="margin-top:6px;font:var(--t-small);color:var(--fg-2)">Default · normal operations</div>
    </div>
    <div style="border-radius:12px;padding:14px;background:var(--card-bg);border:1px solid var(--line-1)">
      <span style="display:inline-block;padding:3px 10px;border-radius:6px;background:#241E47;color:#A78BFA;font:700 10.5px var(--font-mono);letter-spacing:.08em">DEBUG</span>
      <div style="margin-top:10px;font:var(--t-mono);font-size:11.5px;color:var(--fg-3)">#A78BFA</div>
      <div style="margin-top:6px;font:var(--t-small);color:var(--fg-2)">Verbose trace · retries · gc</div>
    </div>
</div></body></html>
