<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; width:700px; height:280px; box-sizing:border-box; overflow:hidden; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:10px 18px; border-radius:10px; border:0;
    font:600 13px var(--font-body); cursor:pointer; color:#fff;
    transition: all 200ms ease;
  }
  .btn-primary   { background: var(--primary-400); color:#1B1238; }
  .btn-primary:hover   { background: var(--primary-300); }
  .btn-secondary { background: rgba(255,255,255,.04); border:1px solid var(--line-2); color: var(--fg-1); }
  .btn-secondary:hover { background: rgba(255,255,255,.08); }
  .btn-inverted  { background: var(--primary-100); color: var(--primary-900); }
  .btn-outlined  { background: transparent; border:1px solid var(--line-3); color: var(--fg-1); }
  .btn-outlined:hover { border-color: var(--primary-400); color: var(--primary-300); }
  .btn-danger    { background: var(--status-error); color:#3A0A14; }
  .btn-sm { padding:6px 12px; font-size:12px; border-radius:8px; }
  .btn-lg { padding:12px 24px; font-size:15px; border-radius:12px; }
  .ico { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
</style></head>
<body>
  <div class="label" style="margin-bottom:14px">BUTTONS · SOLID, NEVER GRADIENT</div>

  <div style="display:flex; flex-direction:column; gap:14px">
    <div class="row">
      <button class="btn btn-primary">
        <svg class="ico" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
        Apply filter
      </button>
      <button class="btn btn-secondary">Cancel</button>
      <button class="btn btn-inverted">Acknowledge</button>
      <button class="btn btn-outlined">View details</button>
      <button class="btn btn-danger">Revoke session</button>
    </div>

    <div class="row">
      <button class="btn btn-primary btn-sm">Apply</button>
      <button class="btn btn-primary">Apply filter</button>
      <button class="btn btn-primary btn-lg">Apply filter now</button>
      <span style="font:var(--t-mono); font-size:11px; color:var(--fg-3); margin-left:6px">sm · md · lg</span>
    </div>

    <div class="row" style="gap:12px; align-items:center">
      <span class="label">ICON ONLY</span>
      <button class="btn btn-secondary" style="padding:8px; border-radius:10px">
        <svg class="ico" viewBox="0 0 24 24" style="width:16px; height:16px"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>
      <button class="btn btn-secondary" style="padding:8px; border-radius:10px">
        <svg class="ico" viewBox="0 0 24 24" style="width:16px; height:16px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
      </button>
      <button class="btn btn-secondary" style="padding:8px; border-radius:10px">
        <svg class="ico" viewBox="0 0 24 24" style="width:16px; height:16px"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
</body></html>
