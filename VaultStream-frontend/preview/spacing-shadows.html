<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:180px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="label" style="margin-bottom:18px">SHADOWS · NEUTRAL DROP ONLY</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:120px;height:78px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.3)"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">--shadow-sm</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">default</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:120px;height:78px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;box-shadow:0 8px 24px -8px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.3)"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">--shadow-md</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">floating</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:120px;height:78px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;box-shadow:0 24px 64px -16px rgba(0,0,0,.6)"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">--shadow-lg</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">modals</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:120px;height:78px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 8px 28px -12px rgba(0,0,0,.6)"></div>
      <div style="font:600 12px var(--font-body);color:var(--fg-1)">--shadow-card</div>
      <div style="font:var(--t-mono);font-size:10px;color:var(--fg-3)">cards</div>
    </div>
</div></body></html>
