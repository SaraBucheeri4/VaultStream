<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:180px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="eyebrow" style="margin-bottom:14px">PINK — ACCENT SCALE</div>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
  
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#F9A8D4"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">300</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#F9A8D4</div>
      </div>
    </div>
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#F472B6"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">400</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#F472B6</div>
      </div>
    </div>
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#EC4899"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">500</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#EC4899</div>
      </div>
    </div>
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#E91E8C"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">600</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#E91E8C</div>
      </div>
    </div>
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#BE185D"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">700</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#BE185D</div>
      </div>
    </div>
</div></body></html>
