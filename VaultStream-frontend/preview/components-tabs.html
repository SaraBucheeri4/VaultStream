<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:180px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="label" style="margin-bottom:14px">TABS · UNDERLINE + SEGMENTED</div>
<div style="display:flex;gap:26px;align-items:center;padding-bottom:14px;border-bottom:1px solid var(--line-1)">
  
    <div style="position:relative;padding:6px 0;font:500 14px var(--font-body);color:var(--fg-3);cursor:pointer">
      Overview
      
    </div>
    <div style="position:relative;padding:6px 0;font:600 14px var(--font-body);color:#F8FAFC;cursor:pointer">
      System Logs
      <div style="position:absolute;left:0;right:0;bottom:-15px;height:2px;background:var(--primary-400);border-radius:2px;box-shadow:0 0 10px rgba(167,139,250,.6)"></div>
    </div>
    <div style="position:relative;padding:6px 0;font:500 14px var(--font-body);color:var(--fg-3);cursor:pointer">
      Security
      
    </div>
    <div style="position:relative;padding:6px 0;font:500 14px var(--font-body);color:var(--fg-3);cursor:pointer">
      Audit
      
    </div>
</div>
<div style="margin-top:24px;display:inline-flex;background:rgba(255,255,255,.04);border:1px solid var(--line-2);border-radius:10px;padding:3px">
  
    <span style="padding:6px 16px;border-radius:7px;font:600 12px var(--font-body);color:#1B1238;background:var(--primary-400)">Live</span>
    <span style="padding:6px 16px;border-radius:7px;font:600 12px var(--font-body);color:var(--fg-3);">1H</span>
    <span style="padding:6px 16px;border-radius:7px;font:600 12px var(--font-body);color:var(--fg-3);">24H</span>
</div></body></html>
