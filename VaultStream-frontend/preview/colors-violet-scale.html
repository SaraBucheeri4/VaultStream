<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:180px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="eyebrow" style="margin-bottom:14px">VIOLET — PRIMARY SCALE</div>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
  
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#C4B5FD;border-radius:10px 10px 0 0"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">300</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#C4B5FD</div>
      </div>
    </div>
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#A78BFA;border-radius:10px 10px 0 0"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">400</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#A78BFA</div>
      </div>
    </div>
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#8B5CF6;border-radius:10px 10px 0 0"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">500</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#8B5CF6</div>
      </div>
    </div>
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#7C3AED;border-radius:10px 10px 0 0"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">600</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#7C3AED</div>
      </div>
    </div>
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#6B4FBB;border-radius:10px 10px 0 0"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">700</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#6B4FBB</div>
      </div>
    </div>
    <div style="border-radius:10px;overflow:hidden">
      <div style="height:64px;background:#5B21B6;border-radius:10px 10px 0 0"></div>
      <div style="padding:6px 8px;background:rgba(255,255,255,.03)">
        <div style="font:600 12px var(--font-sans);color:var(--fg-1)">800</div>
        <div style="font:500 10.5px var(--font-mono);color:var(--fg-3)">#5B21B6</div>
      </div>
    </div>
</div></body></html>
