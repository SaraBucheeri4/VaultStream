<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:180px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="label" style="margin-bottom:14px">STATUS PILLS · LIVE ACTIVITY</div>
<div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center">
  
    <span style="display:inline-flex;align-items:center;padding:4px 11px;border-radius:6px;background:rgba(34,211,238,.12);color:#22D3EE;font:700 10.5px var(--font-mono);letter-spacing:.08em">SUCCESS</span>
    <span style="display:inline-flex;align-items:center;padding:4px 11px;border-radius:6px;background:rgba(236,72,153,.14);color:#F472B6;font:700 10.5px var(--font-mono);letter-spacing:.08em">THROTTLED</span>
    <span style="display:inline-flex;align-items:center;padding:4px 11px;border-radius:6px;background:rgba(239,68,68,.16);color:#FB7185;font:700 10.5px var(--font-mono);letter-spacing:.08em">CRITICAL</span>
    <span style="display:inline-flex;align-items:center;padding:4px 11px;border-radius:6px;background:rgba(236,72,153,.14);color:#F472B6;font:700 10.5px var(--font-mono);letter-spacing:.08em">FAST</span>
    <span style="display:inline-flex;align-items:center;padding:4px 11px;border-radius:6px;background:rgba(34,211,238,.10);color:#22D3EE;font:700 10.5px var(--font-mono);letter-spacing:.08em">Live</span>
</div>
<div style="margin-top:18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
  
    <span style="display:inline-flex;align-items:center;padding:5px 12px;border-radius:999px;background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);color:#FB7185;font:500 12px var(--font-body)">● 2 Alerts</span>
    <span style="display:inline-flex;align-items:center;padding:5px 12px;border-radius:999px;background:transparent;border:1px solid transparent;color:#22D3EE;font:500 12px var(--font-body)">● All systems operational</span>
    <span style="display:inline-flex;align-items:center;padding:5px 12px;border-radius:999px;background:rgba(34,211,238,.10);border:1px solid rgba(34,211,238,.25);color:#22D3EE;font:500 12px var(--font-body)">● Real-time Connected</span>
</div></body></html>
