<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;height:220px;box-sizing:border-box;overflow:hidden}</style>
</head><body>
<div class="label" style="margin-bottom:12px">LABEL FACE · GEIST</div>
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="font:600 11px var(--font-label);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3)">REQUEST COUNT</div>
  <div style="font:var(--t-mono);font-size:11px;color:var(--fg-4)">Geist · 11/1.3 · 600 · UPPERCASE · +.12em</div>
  <div style="display:flex;gap:14px;align-items:center;margin-top:8px;flex-wrap:wrap">
    <span style="font:600 11px var(--font-label);letter-spacing:.10em;text-transform:uppercase;color:var(--fg-3)">TOTAL LOGS TODAY</span>
    <span style="font:600 11px var(--font-label);letter-spacing:.10em;text-transform:uppercase;color:var(--fg-3)">SYSTEM ERROR RATE</span>
    <span style="font:600 11px var(--font-label);letter-spacing:.10em;text-transform:uppercase;color:var(--fg-3)">ACTIVE SESSIONS</span>
  </div>
  <div style="margin-top:8px;font:var(--t-body);color:var(--fg-3)">Geist sits between Inter and Orbitron. Use it for stat-card labels, table headers, and small uppercase microcopy where Orbitron would feel too loud.</div>
</div></body></html>
